stages:
  data_transformation:
    cmd: python -c "from src.datascience.pipeline.stage_02_data_transformation import DataTransformationPipeline; DataTransformationPipeline().run()"
    deps:
      - data/raw/train.csv
      - data/raw/bids.csv
      - src/datascience/components/data_transformation.py
      - config/config.yaml
      - schema.yaml
    outs:
      - artifacts/data_transformation

  model_trainer:
    cmd: python -c "from src.datascience.pipeline.stage_03_model_trainer import ModelTrainerPipeline; ModelTrainerPipeline().run()"
    deps:
      - artifacts/data_transformation/train.csv
      - src/datascience/components/model_trainer.py
      - params.yaml
    params:
      - XGBoost
    outs:
      - artifacts/model_trainer

  model_evaluation:
    cmd: python -c "from src.datascience.pipeline.stage_04_model_evaluation import ModelEvaluationPipeline; ModelEvaluationPipeline().run()"
    deps:
      - artifacts/model_trainer/model.joblib
      - artifacts/data_transformation/test.csv
      - src/datascience/components/model_evaluation.py
    outs:
      - artifacts/model_evaluation/roc_curve.png
    metrics:
      - artifacts/model_evaluation/metrics.json:
          cache: false
