prediction_threshold: 0.4

# Fixed best params from GridSearchCV (CV ROC AUC: 0.9038)
XGBoost:
  n_estimators: 100
  max_depth: 3
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8

# GridSearchCV config — used only in research/03_model_training.ipynb
GridSearchCV:
  n_estimators:
    - 100
    - 200
    - 300
  max_depth:
    - 3
    - 5
    - 7
  learning_rate:
    - 0.05
    - 0.1
    - 0.2
  subsample:
    - 0.8
    - 1.0
  colsample_bytree:
    - 0.8
    - 1.0
  cv: 5
  scoring: roc_auc
  n_jobs: -1
